<p-button [style.padding]="'1rem'" label="Create employee" [severity]="'info'" (onClick)="createEmployee()"/>

<p-table
    [value]="employees.list"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    (onPage)="onPage($event)"
    (onFilter)="onFilter($event)"
    [globalFilterFields]="['firstName', 'jobTitle']"
    dataKey="id"
    [first]="first"
    [rows]="rows"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loading"
    #table
>
  <ng-template #header>
      <tr>
          <th>id</th>
          <th>First name</th>
          <th>Last name</th>
          <th>Job title</th>
          <th>Salary</th>
          <th>Actions</th>
      </tr>
      <tr>
        <th></th>
        <th>
            <p-columnFilter
                type="text"
                field="firstName"
                placeholder="Search by name"
                ariaLabel="Filter Name"
            ></p-columnFilter>
        </th>
        <th></th>
        <th>
          <p-columnFilter
              type="text"
              field="jobTitle"
              placeholder="Search by job title"
              ariaLabel="Job title"
          ></p-columnFilter>
      </th>
      <th></th>
      <th></th>
      </tr>
  </ng-template>
  <ng-template #body let-employee>
      <tr>
          <td>{{ employee.id }}</td>
          <td>{{ employee.firstName }}</td>
          <td>{{ employee.lastName }}</td>
          <td>{{ employee.jobTitle }}</td>
          <td>{{ employee.salary }}</td>
          <td>
              <div class="card flex flex-wrap gap-4 justify-center">
                <p-button [style.padding]="'1rem'" label="Edit" [severity]="'info'" (onClick)="editEmployee(employee)"/>
                <p-button label="Delete" [severity]="'danger'" (onClick)="deleteEmployee(employee)"/>
              </div>
          </td>
      </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
        <td colspan="5">No employees found.</td>
    </tr>
</ng-template>
</p-table>


<div class="card flex justify-center gap-2">
  <p-toast />
  <p-confirmdialog />
</div>

<p-dialog header="Edit Profile" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
    <form class="flex items-center gap-1" [formGroup]="formGroup" (submit)="updateEmployee()">
      <span class="p-text-secondary block mb-8">Update {{formGroup.controls['firstName'].value}} {{formGroup.controls['lastName'].value}} information</span>

        <p-inputgroup>
          <p-inputgroup-addon>
              <i class="pi pi-user"></i>
          </p-inputgroup-addon>
          <input pInputText
            formControlName="firstName"
            placeholder="First name" />
        </p-inputgroup>

        <p-inputgroup>
          <p-inputgroup-addon>
              <i class="pi pi-user"></i>
          </p-inputgroup-addon>
          <input pInputText
            formControlName="lastName"
            placeholder="Last name" />
        </p-inputgroup>

        <p-inputgroup>
          <p-inputgroup-addon>
              <i class="pi pi-briefcase"></i>
          </p-inputgroup-addon>
          <input pInputText
            formControlName="jobTitle"
            placeholder="Job title" />
        </p-inputgroup>

        <p-inputgroup>
          <p-inputgroup-addon>
              <i class="pi pi-money-bill"></i>
          </p-inputgroup-addon>
          <input pInputText
            formControlName="salary"
            placeholder="Salary" />
        </p-inputgroup>
        <div class="flex justify-end gap-2">
          <p-button label="Cancel" severity="secondary" (onClick)="cancelEditEmployee()" />
          <p-button label="Save" [type]="'submit'" />
      </div>
    </form>
</p-dialog>
